<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestPath AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.app {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card {
  background:#111827;
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.title {
  font-size:18px;
  font-weight:bold;
}

.subtitle {
  opacity:0.6;
  font-size:13px;
}

.bubble {
  background:#1f2937;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.buttons button {
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button {
  background:#2563eb;
  color:white;
}

button.secondary {
  background:#1f2937;
}

.hidden {
  display:none;
}

/* MODAL */

.modal {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111827;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  padding:20px;
  animation:slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform:translateY(100%); }
  to { transform:translateY(0); }
}

.close-btn {
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.instrument-block {
  margin-top:10px;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.instrument-block-title {
  font-weight:bold;
  margin-bottom:6px;
}

.warn {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <div class="title">InvestPath AI</div>
  <div class="subtitle">Подбор инвестиционного портфеля</div>
</div>

<div class="card">
  <div class="bubble">
    Это персональный советчик по инвестициям ваших средств.
  </div>

  <div class="buttons">
    <button onclick="buildPortfolio()">Собрать портфель под мою сумму</button>
  </div>
</div>

</div>

<!-- PORTFOLIO MODAL -->
<div id="portfolioModal" class="modal hidden">
  <div style="display:flex; justify-content:space-between;">
    <div class="title">Готовый портфель</div>
    <button class="close-btn" onclick="closePortfolio()">×</button>
  </div>

  <div id="portfolioContent"></div>

  <div class="buttons">
    <button onclick="showImprovement()">Что можно улучшить?</button>
    <button class="secondary" onclick="openPro()">PRO версия</button>
  </div>
</div>

<!-- IMPROVEMENT MODAL -->
<div id="improvementModal" class="modal hidden">
  <div style="display:flex; justify-content:space-between;">
    <div class="title">Что можно улучшить?</div>
    <button class="close-btn" onclick="closeImprovement()">×</button>
  </div>

  <div id="improvementContent"></div>

  <div class="buttons">
    <button class="secondary" onclick="openPro()">Получить в PRO</button>
  </div>
</div>

<script>

function buildPortfolio() {
  document.getElementById("portfolioContent").innerHTML = `
    <div class="instrument-block">
      <div class="instrument-block-title">Акции</div>
      <ul>
        <li>Сбер</li>
        <li>Лукойл</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Фонды</div>
      <ul>
        <li>TMOS</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Облигации</div>
      <ul>
        <li>ОФЗ 26238</li>
      </ul>
    </div>

    <div class="warn">
      Это базовый сценарий портфеля.
    </div>
  `;

  document.getElementById("portfolioModal").classList.remove("hidden");
}

function closePortfolio() {
  document.getElementById("portfolioModal").classList.add("hidden");
}

function showImprovement() {
  document.getElementById("improvementContent").innerHTML = `
    <div class="instrument-block">
      <div class="instrument-block-title">Точный расчёт</div>
      <ul>
        <li>Количество акций под бюджет</li>
        <li>Распределение средств</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Реальные цены</div>
      <ul>
        <li>Актуальные котировки</li>
        <li>Обновление портфеля</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Брокеры</div>
      <ul>
        <li>Сравнение комиссий</li>
      </ul>
    </div>

    <div class="warn">
      Эти функции доступны в PRO версии.
    </div>
  `;

  document.getElementById("improvementModal").classList.remove("hidden");
}

function closeImprovement() {
  document.getElementById("improvementModal").classList.add("hidden");
}

function openPro() {
  alert("PRO версия скоро 🚀");
}

</script>

</body>
</html>
