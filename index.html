<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestPath AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 14px;
}

.app {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  margin-top: 8px;
  font-weight: 600;
  cursor: pointer;
}

.secondary {
  background: #1f2937;
}

.hidden {
  display: none;
}

.instrument-block {
  background: #0b1220;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.pro-screen {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
}

.pro-feature {
  margin-top: 10px;
}

.pro-price {
  font-size: 28px;
  text-align: center;
  margin: 20px 0;
}
</style>
</head>

<body>
<div class="app">

<div id="start">
  <div class="card">
    <h2>InvestPath AI</h2>
    <p>Подбор инвест сценария за 1 минуту</p>
    <button onclick="start()">Начать</button>
  </div>
</div>

<div id="main" class="hidden">
  <div class="card">
    <p>Выберите риск</p>
    <button onclick="setRisk('Консервативный')">Консервативный</button>
    <button onclick="setRisk('Сбалансированный')">Сбалансированный</button>
    <button onclick="setRisk('Агрессивный')">Агрессивный</button>
  </div>
</div>

<div id="result" class="hidden">
  <div class="card">
    <button onclick="getAI()">Получить AI-разбор</button>
  </div>

  <div id="analysis" class="card hidden"></div>

  <div id="variants" class="card hidden"></div>

  <div id="scenarios" class="card hidden"></div>
</div>

<div id="proScreen" class="hidden">
  <div class="pro-screen">
    <h2>PRO версия</h2>

    <div class="pro-feature">✅ Больше портфелей</div>
    <div class="pro-feature">✅ Полные сценарии</div>
    <div class="pro-feature">✅ Глубокий анализ</div>

    <div class="pro-price">299 ₽</div>

    <button onclick="buy()">Купить PRO</button>
    <button class="secondary" onclick="closePro()">Назад</button>
  </div>
</div>

</div>

<script>
const API = "https://investpath-backend.onrender.com/analyze";

let profile = {
  risk: ""
};

function start() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
}

function setRisk(r) {
  profile.risk = r;
  document.getElementById("main").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
}

async function getAI() {
  let res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(profile)
  });

  let data = await res.json();

  document.getElementById("analysis").classList.remove("hidden");
  document.getElementById("analysis").innerText = data.analysis;

  renderVariants(data.variants);
  renderScenarios(data.scenarios);
}

function renderVariants(v) {
  let html = "<h3>Варианты</h3>";

  v.forEach(x => {
    html += `<div class="instrument-block"><b>${x.title}</b>`;
    for (let k in x.blocks) {
      html += `<div><b>${k}</b><ul>`;
      x.blocks[k].forEach(i => html += `<li>${i}</li>`);
      html += "</ul></div>";
    }
    html += "</div>";
  });

  let el = document.getElementById("variants");
  el.innerHTML = html;
  el.classList.remove("hidden");
}

function renderScenarios(s) {
  let el = document.getElementById("scenarios");
  el.classList.remove("hidden");

  el.innerHTML = `
    <h3>Сценарии</h3>

    <button onclick="showBase()">Базовый</button>
    <button onclick="openPro()">Осторожный (PRO)</button>
    <button onclick="openPro()">Позитивный (PRO)</button>

    <div id="scenarioText"></div>
  `;

  window.currentScenarios = s;
}

function showBase() {
  document.getElementById("scenarioText").innerText =
    currentScenarios.base;
}

function openPro() {
  document.getElementById("result").classList.add("hidden");
  document.getElementById("proScreen").classList.remove("hidden");
}

function closePro() {
  document.getElementById("proScreen").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
}

function buy() {
  alert("Дальше подключаем оплату (Telegram Payments)");
}
</script>

</body>
</html>
