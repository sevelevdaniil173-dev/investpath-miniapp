<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvestPath AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #07111f 0%, #0b1730 100%);
      color: #fff;
      padding: 14px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
    }

    .phone {
      background: #0f172a;
      border: 1px solid #23314b;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .topbar {
      background: #0b1220;
      padding: 16px 18px;
      border-bottom: 1px solid #1f2937;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
    }

    .topbar-subtitle {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 13px;
    }

    .chat {
      padding: 16px;
      min-height: 560px;
      max-height: 72vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at top, rgba(37,99,235,0.09), transparent 32%),
        #0f172a;
    }

    .msg {
      max-width: 85%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 16px;
      white-space: pre-line;
      animation: fadeIn 0.18s ease;
    }

    .bot {
      align-self: flex-start;
      background: #172033;
      border: 1px solid #25324a;
      border-bottom-left-radius: 8px;
      color: #edf3ff;
    }

    .user {
      align-self: flex-end;
      background: #2f67ea;
      border-bottom-right-radius: 8px;
      color: white;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
      animation: fadeIn 0.18s ease;
    }

    .choice-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 16px;
      background: #2f67ea;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .choice-btn:hover {
      opacity: 0.96;
    }

    .choice-btn:active {
      transform: scale(0.985);
      background: #2256cb;
    }

    .choice-btn.secondary {
      background: #1f2937;
      border: 1px solid #334155;
    }

    .input-area {
      display: none;
      gap: 10px;
      flex-direction: column;
      animation: fadeIn 0.18s ease;
    }

    .input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #334155;
      background: #0b1220;
      color: white;
      padding: 15px 14px;
      font-size: 16px;
      outline: none;
    }

    .input:focus {
      border-color: #3b82f6;
    }

    .send-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .result-card {
      background: #0b1220;
      border: 1px solid #243146;
      border-radius: 18px;
      padding: 16px;
      margin-top: 6px;
      animation: fadeIn 0.18s ease;
    }

    .result-card h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
    }

    .result-card p {
      margin: 7px 0;
      color: #dbe4f0;
      line-height: 1.45;
      font-size: 15px;
    }

    .tag {
      display: inline-block;
      margin-bottom: 10px;
      background: #172554;
      color: #bfdbfe;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .warning {
      background: #1d2435;
      border: 1px solid #334155;
      color: #d4dbe8;
    }

    .footer-panel {
      border-top: 1px solid #1f2937;
      background: #0b1220;
      padding: 14px;
    }

    .progress-text {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 8px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 8%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      transition: width 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone">
      <div class="topbar">
        <div class="topbar-title">InvestPath AI</div>
        <div class="topbar-subtitle">Персональный советчик по сценариям инвестирования</div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="footer-panel">
        <div class="progress-text" id="progressText">Шаг 1 из 7</div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const chat = document.getElementById("chat");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    const profile = {
      name: "",
      term: "",
      amount: "",
      goal: "",
      risk: ""
    };

    let currentStep = 1;
    const totalSteps = 7;

    function updateProgress(step) {
      currentStep = step;
      progressText.textContent = `Шаг ${step} из ${totalSteps}`;
      progressBar.style.width = `${(step / totalSteps) * 100}%`;
    }

    function scrollChat() {
      setTimeout(() => {
        chat.scrollTop = chat.scrollHeight;
      }, 50);
    }

    function addBotMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg bot";
      msg.textContent = text;
      chat.appendChild(msg);
      scrollChat();
      return msg;
    }

    function addUserMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg user";
      msg.textContent = text;
      chat.appendChild(msg);
      scrollChat();
      return msg;
    }

    function addChoices(buttons) {
      const wrap = document.createElement("div");
      wrap.className = "choices";

      buttons.forEach(btn => {
        const el = document.createElement("button");
        el.className = "choice-btn" + (btn.secondary ? " secondary" : "");
        el.textContent = btn.text;
        el.onclick = () => {
          wrap.remove();
          btn.onClick();
        };
        wrap.appendChild(el);
      });

      chat.appendChild(wrap);
      scrollChat();
      return wrap;
    }

    function addInput(placeholder, onSubmit, buttonText = "Отправить") {
      const wrap = document.createElement("div");
      wrap.className = "input-area";
      wrap.style.display = "flex";

      const input = document.createElement("input");
      input.className = "input";
      input.placeholder = placeholder;

      const button = document.createElement("button");
      button.className = "send-btn";
      button.textContent = buttonText;

      button.onclick = () => {
        const value = input.value.trim();
        if (!value) return;
        wrap.remove();
        onSubmit(value);
      };

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          button.click();
        }
      });

      wrap.appendChild(input);
      wrap.appendChild(button);
      chat.appendChild(wrap);
      input.focus();
      scrollChat();
      return wrap;
    }

    function addResultCard(title, lines, tagText) {
      const card = document.createElement("div");
      card.className = "result-card";

      let html = "";
      if (tagText) {
        html += `<div class="tag">${tagText}</div>`;
      }
      html += `<h3>${title}</h3>`;
      lines.forEach(line => {
        html += `<p>${line}</p>`;
      });

      card.innerHTML = html;
      chat.appendChild(card);
      scrollChat();
    }

    function addWarning(text) {
      const card = document.createElement("div");
      card.className = "result-card warning";
      card.textContent = text;
      chat.appendChild(card);
      scrollChat();
    }

    function startFlow() {
      updateProgress(1);

      addBotMessage("Привет. Это персональный советчик по сценариям инвестирования ваших средств.");

      addChoices([
        {
          text: "Начать",
          onClick: askName
        }
      ]);
    }

    function askName() {
      updateProgress(1);
      addBotMessage("Как я могу к вам обращаться?");
      addInput("Введите имя", (value) => {
        profile.name = value;
        addUserMessage(value);
        askTerm();
      }, "Сохранить имя");
    }

    function askTerm() {
      updateProgress(2);
      addBotMessage(`Приятно познакомиться, ${profile.name}.\n\nНа какой срок вы планируете инвестировать?`);

      addChoices([
        {
          text: "5 месяцев",
          onClick: () => {
            profile.term = "5 месяцев";
            addUserMessage("5 месяцев");
            askAmount();
          }
        },
        {
          text: "1 год",
          onClick: () => {
            profile.term = "1 год";
            addUserMessage("1 год");
            askAmount();
          }
        },
        {
          text: "2 года",
          onClick: () => {
            profile.term = "2 года";
            addUserMessage("2 года");
            askAmount();
          }
        },
        {
          text: "Другой срок",
          secondary: true,
          onClick: () => {
            addUserMessage("Другой срок");
            addInput("Например: 8 месяцев", (value) => {
              profile.term = value;
              addUserMessage(value);
              askAmount();
            }, "Сохранить срок");
          }
        }
      ]);
    }

    function askAmount() {
      updateProgress(3);
      addBotMessage("Какую сумму вы планируете инвестировать?");

      addChoices([
        {
          text: "5 000–10 000 рублей",
          onClick: () => {
            profile.amount = "5 000–10 000 рублей";
            addUserMessage("5 000–10 000 рублей");
            askGoal();
          }
        },
        {
          text: "10 000–30 000 рублей",
          onClick: () => {
            profile.amount = "10 000–30 000 рублей";
            addUserMessage("10 000–30 000 рублей");
            askGoal();
          }
        },
        {
          text: "Другая сумма",
          secondary: true,
          onClick: () => {
            addUserMessage("Другая сумма");
            addInput("Например: 75 000 рублей", (value) => {
              profile.amount = value;
              addUserMessage(value);
              askGoal();
            }, "Сохранить сумму");
          }
        }
      ]);
    }

    function askGoal() {
      updateProgress(4);
      addBotMessage("Какая у вас цель инвестирования?");

      addChoices([
        {
          text: "Сбережение средств",
          onClick: () => {
            profile.goal = "Сбережение средств";
            addUserMessage("Сбережение средств");
            askRisk();
          }
        },
        {
          text: "Приумножение капитала",
          onClick: () => {
            profile.goal = "Приумножение капитала";
            addUserMessage("Приумножение капитала");
            askRisk();
          }
        },
        {
          text: "Другое",
          secondary: true,
          onClick: () => {
            addUserMessage("Другое");
            addInput("Например: накопить на квартиру", (value) => {
              profile.goal = value;
              addUserMessage(value);
              askRisk();
            }, "Сохранить цель");
          }
        }
      ]);
    }

    function askRisk() {
      updateProgress(5);
      addBotMessage("Какой стиль стратегии вам ближе?");

      addChoices([
        {
          text: "Консервативный",
          onClick: () => {
            profile.risk = "Консервативный";
            addUserMessage("Консервативный");
            showDisclaimer();
          }
        },
        {
          text: "Сбалансированный",
          onClick: () => {
            profile.risk = "Сбалансированный";
            addUserMessage("Сбалансированный");
            showDisclaimer();
          }
        },
        {
          text: "Агрессивный",
          onClick: () => {
            profile.risk = "Агрессивный";
            addUserMessage("Агрессивный");
            showDisclaimer();
          }
        }
      ]);
    }

    function showDisclaimer() {
      updateProgress(6);
      addBotMessage("Важно: наш сервис не является индивидуальной инвестиционной рекомендацией.");
      addWarning("Информация в приложении носит информационно-образовательный характер. Перед инвестиционными решениями учитывайте личные риски, комиссии брокеров, горизонт инвестирования и рыночные условия.");

      addChoices([
        {
          text: "Приступить",
          onClick: () => {
            addUserMessage("Приступить");
            showStrategies();
          }
        }
      ]);
    }

    function showStrategies() {
      updateProgress(7);

      addBotMessage(
        `Готово, ${profile.name}.\n\n` +
        `Я учёл ваш профиль:\n` +
        `• Срок: ${profile.term}\n` +
        `• Сумма: ${profile.amount}\n` +
        `• Цель: ${profile.goal}\n` +
        `• Стиль: ${profile.risk}\n\n` +
        `Ниже — 3 примерных сценария.`
      );

      if (profile.risk === "Консервативный") {
        addResultCard("Стратегия 1 — Защита капитала", [
          "Облигации: 70%",
          "Фонды ликвидности / кэш: 20%",
          "Акции крупных компаний: 10%",
          "Брокеры: Сбер, ВТБ, Альфа, Т-Банк"
        ], "Вариант 1");

        addResultCard("Стратегия 2 — Спокойный доход", [
          "ОФЗ и надёжные облигации: 60%",
          "Фонды облигаций: 25%",
          "Дивидендные акции: 15%",
          "Брокеры: Сбер, Альфа, Т-Банк"
        ], "Вариант 2");

        addResultCard("Стратегия 3 — Минимальный риск", [
          "Короткие облигации: 50%",
          "Фонды денежного рынка: 40%",
          "Акции голубых фишек: 10%",
          "Брокеры: ВТБ, Сбер, Т-Банк"
        ], "Вариант 3");
      } else if (profile.risk === "Сбалансированный") {
        addResultCard("Стратегия 1 — Баланс роста", [
          "ETF и фонды акций: 40%",
          "Облигации: 40%",
          "Денежный рынок: 20%",
          "Брокеры: Сбер, Альфа, Т-Банк"
        ], "Вариант 1");

        addResultCard("Стратегия 2 — Умеренный рост", [
          "Акции крупных компаний: 35%",
          "Облигации: 35%",
          "Фонды на индекс: 30%",
          "Брокеры: Т-Банк, ВТБ, Альфа"
        ], "Вариант 2");

        addResultCard("Стратегия 3 — Комбинированная", [
          "Российские акции: 30%",
          "ETF: 30%",
          "Облигации: 30%",
          "Кэш: 10%",
          "Брокеры: Сбер, ВТБ, Альфа"
        ], "Вариант 3");
      } else {
        addResultCard("Стратегия 1 — Рост капитала", [
          "Акции роста: 60%",
          "ETF на индекс: 25%",
          "Высокорискованные идеи: 15%",
          "Брокеры: Т-Банк, Альфа, Сбер"
        ], "Вариант 1");

        addResultCard("Стратегия 2 — Агрессивная", [
          "Акции: 70%",
          "Секторные идеи: 20%",
          "Кэш: 10%",
          "Брокеры: Т-Банк, ВТБ, Альфа"
        ], "Вариант 2");

        addResultCard("Стратегия 3 — Максимум роста", [
          "Акции и ETF: 80%",
          "Спекулятивная часть: 20%",
          "Брокеры: Сбер, Т-Банк, Альфа"
        ], "Вариант 3");
      }

      tg.MainButton.setText("Получить подробный план");
      tg.MainButton.color = "#2563eb";
      tg.MainButton.textColor = "#ffffff";
      tg.MainButton.show();
    }

    tg.MainButton.onClick(function () {
      tg.showAlert("Следующий этап: можно подключить ChatGPT для персонального разбора стратегии и генерации более точного плана.");
    });

    startFlow();
  </script>
</body>
</html>
