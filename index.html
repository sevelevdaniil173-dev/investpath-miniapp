<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestPath AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 24px;
    }

    .box {
      max-width: 420px;
      margin: 40px auto;
      background: #111827;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #d1d5db;
      line-height: 1.5;
    }

    .user-card {
      margin: 20px 0;
      padding: 14px;
      background: #1f2937;
      border-radius: 12px;
      display: none;
    }

    .label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      display: none;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>InvestPath AI</h1>
    <p>Подбор сценариев инвестирования под ваши цели.</p>

    <div class="user-card" id="userCard">
      <div class="label">Пользователь Telegram</div>
      <div class="value" id="userName">Не определён</div>
    </div>

<div id="quiz">

  <div class="question" id="q1">
    <p>Сколько хочешь инвестировать?</p>
    <button onclick="next(1, '100k')">до 100k ₽</button>
    <button onclick="next(1, '500k')">100k–500k ₽</button>
    <button onclick="next(1, '1m+')">1 млн+ ₽</button>
  </div>

  <div class="question" id="q2" style="display:none;">
    <p>Срок инвестиций?</p>
    <button onclick="next(2, 'short')">до 1 года</button>
    <button onclick="next(2, 'mid')">1–3 года</button>
    <button onclick="next(2, 'long')">3+ года</button>
  </div>

  <div class="question" id="q3" style="display:none;">
    <p>Готов к риску?</p>
    <button onclick="next(3, 'low')">минимальный</button>
    <button onclick="next(3, 'medium')">средний</button>
    <button onclick="next(3, 'high')">высокий</button>
  </div>

  <div class="result" id="resultBox"></div>

</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const userCard = document.getElementById("userCard");
    const userName = document.getElementById("userName");
    const resultBox = document.getElementById("resultBox");

    if (user) {
      userCard.style.display = "block";
      userName.textContent = `${user.first_name || ""} ${user.last_name || ""}`.trim();
    }

    tg.MainButton.setText("Продолжить");
    tg.MainButton.color = "#2563eb";
    tg.MainButton.textColor = "#ffffff";

    function startApp() {
      let text = "Мини-приложение запущено успешно.";

      if (user) {
        text += `\n\nПривет, ${user.first_name}!`;
      } else {
        text += "\n\nTelegram-пользователь не определён.";
      }

      text += "\n\nСледующий шаг: добавим анкету инвестора.";

      resultBox.style.display = "block";
      resultBox.textContent = text;

      tg.MainButton.show();
    }

    tg.MainButton.onClick(function () {
      resultBox.style.display = "block";
      resultBox.textContent += "\n\nНажата главная кнопка Telegram.";
    });
  let answers = {};

function next(step, value) {
  answers["q" + step] = value;

  document.getElementById("q" + step).style.display = "none";

  if (step < 3) {
    document.getElementById("q" + (step + 1)).style.display = "block";
  } else {
    showResult();
  }
}

function showResult() {
  const box = document.getElementById("resultBox");
  box.style.display = "block";

  let result = "Твоя стратегия:\n\n";

  if (answers.q3 === "low") {
    result += "Консервативная: облигации, вклады";
  } else if (answers.q3 === "medium") {
    result += "Сбалансированная: ETF + облигации";
  } else {
    result += "Агрессивная: акции, крипто";
  }

  box.textContent = result;

  tg.MainButton.setText("Сохранить стратегию");
  tg.MainButton.show();
}
</body>
</html>
