<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestPath AI</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      margin: auto;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #2563eb;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    .secondary {
      background: #1f2937;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      background: #111827;
      border-radius: 12px;
      white-space: pre-line;
    }

    .ai-variant-card {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }

    .ai-variant-list {
      padding-left: 18px;
    }

    .pro {
      margin-top: 20px;
      padding: 14px;
      background: #111827;
      border-radius: 12px;
      border: 1px solid #334155;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>InvestPath AI</h2>

  <button onclick="start()">Начать</button>

  <div id="quiz" style="display:none;">
    <p>Выбери стиль:</p>
    <button onclick="selectRisk('Консервативный')">Консервативный</button>
    <button onclick="selectRisk('Сбалансированный')">Сбалансированный</button>
    <button onclick="selectRisk('Агрессивный')">Агрессивный</button>
  </div>

  <div id="aiAnalysisBox" class="result" style="display:none;"></div>

  <div id="aiVariantsWrap" style="display:none;">
    <h3>Подходящие варианты</h3>
    <div id="aiVariantsList"></div>

    <div id="proOfferBox" class="pro" style="display:none;">
      <b id="proOfferTitle">Нужно больше вариантов?</b>
      <p id="proOfferText"></p>
      <button class="secondary" onclick="openPro()">Открыть PRO</button>
    </div>
  </div>

</div>

<script>
const API_URL = "https://investpath-backend.onrender.com/analyze";

let profile = {};

function start() {
  document.getElementById("quiz").style.display = "block";
}

function selectRisk(risk) {
  profile = {
    name: "инвестор",
    term: "5 месяцев",
    amount: "5 000–10 000 рублей",
    goal: "Приумножение капитала",
    risk: risk
  };

  requestAiAnalysis();
}

async function requestAiAnalysis() {
  const aiBox = document.getElementById("aiAnalysisBox");
  const wrap = document.getElementById("aiVariantsWrap");
  const list = document.getElementById("aiVariantsList");
  const pro = document.getElementById("proOfferBox");

  aiBox.style.display = "block";
  aiBox.textContent = "Анализируем...";

  wrap.style.display = "none";
  list.innerHTML = "";
  pro.style.display = "none";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(profile)
    });

    const data = await res.json();

    aiBox.textContent = data.analysis;

    if (data.variants) {
      wrap.style.display = "block";

      list.innerHTML = data.variants.map(v => `
        <div class="ai-variant-card">
          <b>${v.title}</b><br>
          <small>${v.subtitle}</small>
          <ul class="ai-variant-list">
            ${v.tools.map(t => `<li>${t}</li>`).join("")}
          </ul>
        </div>
      `).join("");
    }

    if (data.pro_offer) {
      pro.style.display = "block";
      document.getElementById("proOfferTitle").textContent = data.pro_offer.title;
      document.getElementById("proOfferText").textContent = data.pro_offer.text;
    }

  } catch (e) {
    aiBox.textContent = "Ошибка подключения";
  }
}

function openPro() {
  alert("PRO версия скоро 🚀");
}
</script>

</body>
</html>
