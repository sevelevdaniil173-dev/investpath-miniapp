<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestPath AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b1220;
  color: white;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  background: #2f6df6;
  color: white;
  font-weight: 600;
}

.secondary {
  background: #1f2937;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.subtitle {
  color: #9ca3af;
  font-size: 14px;
}

.hidden {
  display: none;
}

/* ===== МОДАЛКА ===== */

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  width: 100%;
  max-width: 420px;
  background: #0f172a;
  border-radius: 20px 20px 0 0;
  padding: 16px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.close-btn {
  background: none;
  color: white;
  font-size: 24px;
  border: none;
}

.instrument-block {
  background: #111827;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.instrument-block-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.portfolio-summary {
  background: #1e3a8a;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.warn {
  color: #facc15;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="app">

<div class="title">InvestPath AI</div>
<div class="subtitle">Подбор инвестиционного портфеля</div>

<button onclick="buildPortfolio()">Собрать портфель под мою сумму</button>

</div>

<!-- МОДАЛКА -->
<div id="portfolioModal" class="modal hidden">
  <div class="modal-content">

    <div style="display:flex;justify-content:space-between;">
      <div>
        <div class="title">Готовый портфель</div>
        <div class="subtitle" id="portfolioModalSubtitle"></div>
      </div>
      <button class="close-btn" onclick="closePortfolioModal()">×</button>
    </div>

    <div id="portfolioModalBody"></div>

    <button onclick="savePortfolio()">Сохранить</button>
    <button class="secondary" onclick="openPro()">PRO версия</button>

  </div>
</div>

<script>

const profile = {
  amount: "10 000 рублей"
};

function buildPortfolio() {
  const modal = document.getElementById("portfolioModal");
  const body = document.getElementById("portfolioModalBody");
  const subtitle = document.getElementById("portfolioModalSubtitle");

  subtitle.innerText = "Под сумму: " + profile.amount;

  body.innerHTML = `
    <div class="portfolio-summary">
      Сбалансированный портфель для умеренного риска
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Акции</div>
      <ul>
        <li>Сбер — 20%</li>
        <li>Лукойл — 15%</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Фонды</div>
      <ul>
        <li>TMOS — 25%</li>
        <li>SBMX — 15%</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Облигации</div>
      <ul>
        <li>ОФЗ — 15%</li>
      </ul>
    </div>

    <div class="instrument-block">
      <div class="instrument-block-title">Кэш</div>
      <ul>
        <li>10% для докупки</li>
      </ul>
    </div>

    <div class="warn">
      Это не инвестиционная рекомендация
    </div>
  `;

  modal.classList.remove("hidden");
}

function closePortfolioModal() {
  document.getElementById("portfolioModal").classList.add("hidden");
}

function savePortfolio() {
  alert("Сохранено (пока демо)");
}

function openPro() {
  alert("PRO будет платный 🚀");
}

</script>

</body>
</html>
